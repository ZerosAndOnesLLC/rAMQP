# Latency-tuned RabbitMQ 4.x config for the ramqp-broker comparison.
#
# The published Phase 4/6 tables ran RabbitMQ at stock defaults; broker.md §3.4
# calls for a re-run against a *tuned* incumbent so the comparison isn't
# flattered by the incumbent's out-of-box settings. This gives RabbitMQ its
# best shot: cut per-message and per-connection overhead, and keep the
# scheduler/GC quiet during a run.

# Low latency: disable Nagle on the AMQP listener.
tcp_listen_options.nodelay = true

# Don't let the memory alarm throttle publishers mid-run on a busy box.
vm_memory_high_watermark.relative = 0.8

# Management/stats collection adds per-message and periodic overhead; stretch
# the interval right out (we read results from the bench, not the UI).
collect_statistics_interval = 60000

# Bigger frames + more channels so the client-side credit window isn't the
# bottleneck (the bench uses a 1000-credit window).
frame_max = 1048576
channel_max = 2047

# Classic-queue v2 index/store defaults are fine on 4.x; the durability-parity
# leg declares a quorum queue (x-queue-type=quorum) which fsyncs its Raft log —
# the apples-to-apples comparison against ramqp-broker's store-redb quorum.
